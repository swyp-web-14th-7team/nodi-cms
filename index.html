<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nodi-cms</title>
    <!--
      테마를 첫 페인트 전에 <html> 에 적용한다. React 마운트를 기다리면 한 번
      그려진 뒤 바뀌어 화면이 번쩍인다. <html> 에 테마를 박아두지 않는 이유도
      같다 — 이 스크립트가 유일한 출처다(head 안이라 페인트 전에 실행된다).

      우선순위: 사용자가 고른 값(localStorage) > 시스템 설정.
      키/동작은 features/theme 의 theme-store 와 반드시 일치해야 한다.
    -->
    <script>
      ;(function () {
        var theme
        try {
          var stored = localStorage.getItem('nodi-cms.theme')
          if (stored === 'light' || stored === 'dark') theme = stored
        } catch (e) {
          // localStorage 차단 환경 → 아래 시스템 설정으로 간다.
        }
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light'
        }
        document.documentElement.classList.toggle('dark', theme === 'dark')
        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
